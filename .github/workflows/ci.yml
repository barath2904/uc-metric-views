name: CI
on:
  pull_request:
    paths: ["src/**", "tests/**", "examples/**", "pyproject.toml"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Type check
        run: mypy src/
      - name: Unit tests
        run: pytest tests/ -v --cov=metricviews --cov-report=term

  validate:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('examples/*.yaml') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: ucm validate ./examples/ --strict
