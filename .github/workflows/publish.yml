# Manual PyPI publish. Run this after verifying TestPyPI looks good.
# Once release confidence is established (2-3 releases), collapse this and
# release.yml into a single workflow: tag → TestPyPI → PyPI sequential.
name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0) — must already be on TestPyPI"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event.inputs.tag }}
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.event.inputs.tag }}
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
