# Deploys metric view YAML files to a Databricks Unity Catalog schema.
#
# REQUIRES the following configured on the target GitHub environment
# (dev / staging / prod):
#   Secrets: DATABRICKS_HOST, DATABRICKS_TOKEN
#   Variables: WAREHOUSE_ID, CATALOG, SCHEMA
#
# Contributors forking this repo: this workflow will not run for you
# unless you configure the above in your own repo's environment settings.
# Use `ucm deploy --dry-run` locally to test without credentials.
name: Deploy Metric Views
on:
  push:
    branches: [main]
    paths: ["examples/**"]
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      dry_run:
        description: "Dry run only"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync
      - name: Validate
        run: uv run ucm validate ./examples/ --strict
      - name: Deploy
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ vars.WAREHOUSE_ID }}
          DEPLOY_CATALOG: ${{ vars.CATALOG }}
          DEPLOY_SCHEMA: ${{ vars.SCHEMA }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then FLAGS="--dry-run"; fi
          uv run ucm deploy ./examples/ \
            --catalog "$DEPLOY_CATALOG" \
            --schema "$DEPLOY_SCHEMA" \
            $FLAGS
