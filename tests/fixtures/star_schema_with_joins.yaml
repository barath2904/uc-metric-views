version: "1.1"
source: analytics.gold.fct_orders
joins:
  - name: dim_customer
    source: analytics.gold.dim_customer
    "on": source.o_custkey = dim_customer.c_custkey
dimensions:
  - name: Order Date
    expr: "o_orderdate"
  - name: Customer Name
    expr: "dim_customer.c_name"
measures:
  - name: Row Count
    expr: "COUNT(1)"
  - name: Total Revenue
    expr: "SUM(o_totalprice)"
